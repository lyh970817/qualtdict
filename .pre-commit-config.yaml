# All available hooks: https://pre-commit.com/hooks.html
# R package hooks run through tools/pre-commit.R in the project Nix shell.
default_install_hook_types: [pre-commit, pre-push]

repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks: 
    -   id: check-added-large-files
        args: ['--maxkb=200']
    -   id: file-contents-sorter
        files: '^\.Rbuildignore$'
    -   id: end-of-file-fixer
        exclude: '\.Rd|tests/.*'
-   repo: https://github.com/pre-commit-ci/pre-commit-ci-config
    rev: v1.6.1
    hooks:
    # Only required when https://pre-commit.ci is used for config validation
    -   id: check-pre-commit-ci-config
-   repo: local
    hooks:
    -   id: roxygenize
        name: roxygenize
        entry: Rscript tools/pre-commit.R roxygenize
        language: system
        pass_filenames: false
        files: '^(R/|DESCRIPTION$|NAMESPACE$)'
    -   id: use-tidy-description
        name: use tidy DESCRIPTION
        entry: Rscript tools/pre-commit.R tidy_description
        language: system
        pass_filenames: false
        files: '^DESCRIPTION$'
    -   id: spell-check
        name: spell check package
        entry: Rscript tools/pre-commit.R spell_check
        language: system
        pass_filenames: false
        files: '^(R/|README\.Rmd$|vignettes/|inst/WORDLIST$)'
    -   id: lintr
        name: lint R package
        entry: Rscript tools/pre-commit.R lintr
        language: system
        pass_filenames: false
        types: [r]
    -   id: readme-rmd-rendered
        name: README.Rmd rendered
        entry: Rscript tools/pre-commit.R readme_rendered
        language: system
        pass_filenames: false
        files: '^README\.Rmd$'
    -   id: parsable-R
        name: R files are parsable
        entry: Rscript tools/pre-commit.R parsable_R
        language: system
        types: [r]
    -   id: no-browser-statement
        name: no browser statements
        entry: '\bbrowser\s*\('
        language: pygrep
        types: [r]
    -   id: no-debug-statement
        name: no debug statements
        entry: '\b(debug|debugonce|trace)\s*\('
        language: pygrep
        types: [r]
    -   id: deps-in-desc
        name: "packages used with :: are in DESCRIPTION"
        entry: Rscript tools/pre-commit.R deps_in_desc
        language: system
        pass_filenames: false
        types: [r]
    -   id: forbid-to-commit
        name: Don't commit common R artifacts
        entry: Cannot commit .Rhistory, .RData, .Rds or .rds.
        language: fail
        files: '\.(Rhistory|RData|Rds|rds)$'
        # `exclude: <regex>` to allow committing specific files
    -   id: testthat
        name: Run testthat suite
        entry: Rscript tools/pre-commit.R testthat
        language: system
        pass_filenames: false
        stages: [pre-commit]
    -   id: pkgcheck
        name: Run rOpenSci pkgcheck
        entry: Rscript tools/pre-commit.R pkgcheck
        language: system
        pass_filenames: false
        stages: [pre-push]
    -   id: r-cmd-check
        name: Run R CMD check
        entry: Rscript tools/pre-commit.R r_cmd_check
        language: system
        pass_filenames: false
        stages: [pre-push]

ci:
    autoupdate_schedule: monthly
    skip: [roxygenize, use-tidy-description, spell-check, lintr, readme-rmd-rendered, parsable-R, no-browser-statement, no-debug-statement, deps-in-desc, testthat, pkgcheck, r-cmd-check]
